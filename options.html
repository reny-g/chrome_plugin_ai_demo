<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>AI 摘要 — 设置</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      max-width: 560px;
      margin: 40px auto;
      padding: 0 24px;
      color: #1f2328;
      background: #f6f8fa;
    }
    h1 { font-size: 20px; margin-bottom: 8px; }
    .subtitle { color: #57606a; font-size: 13px; margin-bottom: 24px; }
    .card {
      background: #fff;
      border: 1px solid #e1e4e8;
      border-radius: 8px;
      padding: 20px 24px;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .hint {
      font-size: 12px;
      color: #57606a;
      margin-top: 4px;
    }
    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.1);
    }
    .row { display: flex; gap: 12px; align-items: center; }
    .row > * { flex: 1; }
    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 8px;
    }
    button {
      padding: 8px 16px;
      background: #2da44e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #2c974b; }
    button.secondary {
      background: #fff;
      color: #1f2328;
      border: 1px solid #d0d7de;
    }
    button.secondary:hover { background: #f6f8fa; }
    .saved {
      color: #2da44e;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .saved.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>AI 网页摘要 — 设置</h1>
  <p class="subtitle">配置你要使用的 AI 服务。所有信息仅保存在本机 chrome.storage 中。</p>

  <div class="card">
    <div class="field">
      <label for="provider">AI 来源</label>
      <select id="provider">
        <option value="openai">OpenAI / Doubao（火山引擎）</option>
        <option value="claude">Claude（OpenAI 兼容接口）</option>
        <option value="chrome-ai">Chrome 内置 Summarizer API（无需 Key）</option>
      </select>
      <div class="hint">Chrome 内置 API 需要 Chrome 138+ 并开启对应特性。</div>
    </div>

    <div id="openai-fields">
      <div class="field">
        <label for="apiBase">API Base URL</label>
        <input id="apiBase" type="text" placeholder="https://api.openai.com/v1" />
        <div class="hint">兼容 OpenAI 协议的服务地址，末尾不需要 /chat/completions。</div>
      </div>

      <div class="field">
        <label for="apiKey">API Key</label>
        <input id="apiKey" type="password" placeholder="sk-..." />
      </div>

      <div class="field">
        <label for="model">模型名称</label>
        <input id="model" type="text" placeholder="gpt-4o-mini" />
      </div>
    </div>

    <div class="actions">
      <button id="save">保存设置</button>
      <button id="reset" class="secondary">恢复默认</button>
      <span id="saved-tip" class="saved">已保存 ✓</span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
